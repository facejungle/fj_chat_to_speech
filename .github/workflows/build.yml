name: Build FJ Chat to Speech

permissions:
  contents: write
  packages: read
  actions: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build with Python script
        run: python build.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: fj-chat-to-speech-windows
          path: dist/
          retention-days: 30
